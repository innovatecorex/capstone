name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.PROJECT_PATH }}
            git pull origin master

            # Run any pending database migrations
            php artisan migrate --force

            # Clear all Laravel caches
            php artisan view:clear
            php artisan cache:clear
            php artisan route:clear
            php artisan config:clear

            # Reset PHP OPcache — write script, hit it via the real domain, delete it
            echo '<?php opcache_reset(); echo "ok";' > public/opc.php
            curl -sk https://sakya.academy/opc.php || curl -sk http://sakya.academy/opc.php || true
            rm -f public/opc.php

            # Also try restarting PHP-FPM (works if the SSH user has sudo access)
            sudo systemctl restart php8.2-fpm 2>/dev/null || \
            sudo systemctl restart php8.1-fpm 2>/dev/null || \
            sudo systemctl restart php8.3-fpm 2>/dev/null || \
            sudo service php8.2-fpm restart 2>/dev/null || true
